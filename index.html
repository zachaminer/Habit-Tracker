<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>Habits</title>
    
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-shell">
        <div class="header-section">
            <div class="header-top">
                <div class="header-title" id="currentDateLabel">Today</div>
                <i class="material-icons" style="color:var(--todoist-muted)" onclick="toggleCalendarPopup()">calendar_today</i>
            </div>
            <div class="date-scroller" id="dateBar"></div>
        </div>

        <div class="main-content" id="habitList">
            <p style="text-align:center; color:#999; margin-top:50px;">Loading your habits...</p>
        </div>

        <div class="main-content hidden" id="statsPage">
            <h2 style="padding-top:20px">Statistics</h2>
            <p>Coming soon...</p>
        </div>

        <div class="footer-tabs">
            <div class="nav-item active" id="tabH" onclick="switchTab('habits')">
                <i class="material-icons">checklist</i>Habits
            </div>
            <div class="nav-item" id="tabAdd" onclick="toggleAddHabitPopup()">
                <i class="material-icons">add</i>
            </div>
            <div class="nav-item" id="tabS" onclick="switchTab('stats')">
                <i class="material-icons">bar_chart</i>Stats
            </div>
        </div>
    </div>

    <!-- Custom Calendar Popup (Moved to body for better visibility) -->
    <div id="calendarPopup" class="calendar-popup">
        <div class="calendar-header">
            <span class="today-btn" onclick="goToToday()">Today</span>
            <div class="calendar-nav">
                <i class="material-icons" onclick="changeMonth(-1)">chevron_left</i>
                <span id="currentMonthYear"></span>
                <i class="material-icons" onclick="changeMonth(1)">chevron_right</i>
            </div>
            <i class="material-icons close-btn" onclick="toggleCalendarPopup()">close</i>
        </div>
        <div class="calendar-weekdays">
            <span>Sun</span><span>Mon</span><span>Tue</span><span>Wed</span><span>Thu</span><span>Fri</span><span>Sat</span>
        </div>
        <div class="calendar-days" id="calendarDays"></div>
    </div>

    <!-- Add Habit Full Screen Popup -->
    <div id="addHabitPopup" class="full-screen-popup">
        <div class="popup-header">
            <span onclick="toggleAddHabitPopup()" style="cursor:pointer; color:var(--todoist-muted)">Cancel</span>
            <span style="font-weight:700; font-size:18px;">New Habit</span>
            <span onclick="addNewHabitFromForm()" style="cursor:pointer; color:var(--todoist-red); font-weight:600;">Save</span>
        </div>
        
        <div class="popup-content">
            <!-- Name -->
            <div class="form-group">
                <label>Habit Name</label>
                <input type="text" id="newHabitName" placeholder="e.g., Read 30 mins" class="habit-input">
            </div>

            <!-- Color -->
            <div class="form-group">
                <label>Color</label>
                <div class="color-picker" id="colorPicker">
                    <!-- Generated by JS or static -->
                    <div class="color-circle selected" style="background:#E44332" onclick="selectColor(this, '#E44332')"></div>
                    <div class="color-circle" style="background:#FF9800" onclick="selectColor(this, '#FF9800')"></div>
                    <div class="color-circle" style="background:#FFEB3B" onclick="selectColor(this, '#FFEB3B')"></div>
                    <div class="color-circle" style="background:#4CAF50" onclick="selectColor(this, '#4CAF50')"></div>
                    <div class="color-circle" style="background:#2196F3" onclick="selectColor(this, '#2196F3')"></div>
                    <div class="color-circle" style="background:#9C27B0" onclick="selectColor(this, '#9C27B0')"></div>
                    <div class="color-circle" style="background:#9E9E9E" onclick="selectColor(this, '#9E9E9E')"></div>
                </div>
            </div>

            <!-- Frequency -->
            <div class="form-group">
                <label>Frequency</label>
                <div class="segmented-control">
                    <div class="segment-btn active" data-val="daily" onclick="selectFrequency('daily')">Every Day</div>
                    <div class="segment-btn" data-val="weekly" onclick="selectFrequency('weekly')">Specific Days</div>
                </div>
                <input type="hidden" id="frequencyValue" value="daily">
                <div id="daySelection" class="day-selector hidden" style="margin-top:10px;">
                    <div class="day-circle" onclick="toggleDay(this)">S</div><div class="day-circle" onclick="toggleDay(this)">M</div><div class="day-circle" onclick="toggleDay(this)">T</div><div class="day-circle" onclick="toggleDay(this)">W</div><div class="day-circle" onclick="toggleDay(this)">T</div><div class="day-circle" onclick="toggleDay(this)">F</div><div class="day-circle" onclick="toggleDay(this)">S</div>
                </div>
            </div>

            <!-- Dates -->
            <div class="form-group">
                <label>Start Date</label>
                <input type="text" id="startDate" class="habit-input" readonly onclick="openDatePicker('startDate')">
            </div>
            <div class="form-group">
                <div class="switch-container">
                    <label style="margin:0">End Date</label>
                    <label class="switch">
                        <input type="checkbox" id="hasEndDate" onchange="toggleEndDate()">
                        <span class="slider"></span>
                    </label>
                </div>
                <input type="text" id="endDate" class="habit-input hidden" readonly placeholder="Select End Date" onclick="openDatePicker('endDate')">
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
