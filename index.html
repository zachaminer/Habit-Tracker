<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>Habits</title>
    
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-shell">
        <div class="header-section">
            <div class="header-top">
                <div class="header-title" id="currentDateLabel">Today</div>
                <i class="material-icons" style="color:var(--todoist-muted)" onclick="toggleCalendarPopup()">calendar_today</i>
            </div>
            <div class="date-scroller" id="dateBar"></div>
        </div>

        <div class="main-content" id="habitList">
            <p style="text-align:center; color:#999; margin-top:50px;">Loading your habits...</p>
        </div>

        <div class="main-content hidden" id="statsPage">
            <h2 style="padding-top:20px">Statistics</h2>
            <p>Coming soon...</p>
        </div>

        <div class="footer-tabs">
            <div class="nav-item active" id="tabH" onclick="switchTab('habits')">
                <i class="material-icons">checklist</i>Habits
            </div>
            <div class="nav-item" id="tabAdd" onclick="toggleAddHabitPopup()">
                <i class="material-icons">add</i>
            </div>
            <div class="nav-item" id="tabS" onclick="switchTab('stats')">
                <i class="material-icons">bar_chart</i>Stats
            </div>
        </div>
    </div>

    <!-- Custom Calendar Popup (Moved to body for better visibility) -->
    <div id="calendarPopup" class="calendar-popup">
        <div class="calendar-header">
            <span class="today-btn" onclick="goToToday()">Today</span>
            <div class="calendar-nav">
                <i class="material-icons" onclick="changeMonth(-1)">chevron_left</i>
                <span id="currentMonthYear"></span>
                <i class="material-icons" onclick="changeMonth(1)">chevron_right</i>
            </div>
            <i class="material-icons close-btn" onclick="toggleCalendarPopup()">close</i>
        </div>
        <div class="calendar-weekdays">
            <span>Sun</span><span>Mon</span><span>Tue</span><span>Wed</span><span>Thu</span><span>Fri</span><span>Sat</span>
        </div>
        <div class="calendar-days" id="calendarDays"></div>
    </div>

    <!-- Add Habit Full Screen Popup -->
    <div id="addHabitPopup" class="full-screen-popup">
        <div class="popup-header">
            <span onclick="toggleAddHabitPopup()" style="cursor:pointer; color:var(--todoist-muted)">Cancel</span>
            <span style="font-weight:700; font-size:18px;">New Habit</span>
            <span onclick="addNewHabitFromForm()" style="cursor:pointer; color:var(--todoist-red); font-weight:600;">Save</span>
        </div>
        
        <div class="popup-content">
            <!-- Name -->
            <div class="form-group">
